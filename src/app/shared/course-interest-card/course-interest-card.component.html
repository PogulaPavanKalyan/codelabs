<div class="card">
  <div class="card-body ">
    <h3 class="card-title sect">I'm Interested</h3>
    <p class="text-center ">Learn from the Real-Time Experts</p>

    <!-- Form Starts Here -->
    <div *ngIf="submitSuccess" class="alert alert-success py-2 mt-2 mb-3 shadow-sm" style="font-size: 0.85rem">
      <i class="ri-checkbox-circle-line me-2"></i>
      Thank you for submitting your request. We will contact you shortly.
    </div>
    <div *ngIf="submitError" class="alert alert-danger py-2 mt-2 mb-3 shadow-sm" style="font-size: 0.85rem">
      <i class="ri-error-warning-line me-2"></i>
      Something went wrong. Please try again.
    </div>

    <form (ngSubmit)="enrollForm.form.valid && onSubmit()" #enrollForm="ngForm" novalidate>
      <!-- Full Name Input -->
      <div class="mb-3">
        <input type="text" class="form-control" placeholder="Full Name *" name="fullName"
          [(ngModel)]="contactData.fullName" required />
      </div>

      <!-- Email Input -->
      <div class="mb-3">
        <input type="email" class="form-control" placeholder="Email Address *" name="email"
          [(ngModel)]="contactData.email" required email />
      </div>

      <!-- Mobile Number Input -->
      <div class="mb-3">
        <div class="row g-0">
          <div class="col-3">
            <input value="+91" class="form-control column" disabled>
          </div>
          <div class="col-9">
            <input type="tel" class="form-control column1" placeholder="Mobile Number *" name="mobileNumber"
              [(ngModel)]="contactData.mobileNumber" required maxlength="10" pattern="[0-9]{10}" />
          </div>
        </div>
      </div>

      <!-- City Input -->
      <div class="mb-3">
        <input type="text" class="form-control" placeholder="City" name="city" [(ngModel)]="contactData.city"
          required />
      </div>

      <!-- Batches Input -->
      <div class="mb-4">
        <input type="text" class="form-control" placeholder="Batches Offered" name="batches" required />
      </div>

      <!-- Submit Button -->
      <div class="d-grid">
        <button type="submit" class="btn btn-primary shadow-sm" [disabled]="!enrollForm.form.valid || isSubmitting">
          {{ isSubmitting ? 'Processing...' : 'Enroll Now' }}
        </button>
      </div>
    </form>

    <!-- Terms and Privacy Notice -->
    <div class="mt-4 text-center">
      <p class="text-white-50 m-0" style="font-size: 0.75rem">
        By proceeding, you agree to our
        <a href="javascript:void(0)" class="text-white text-decoration-underline">Terms</a>
        &
        <a href="javascript:void(0)" class="text-white text-decoration-underline">Privacy</a>
      </p>
    </div>
  </div>
</div>
